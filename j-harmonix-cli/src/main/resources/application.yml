spring:
  application:
    name: J-Harmonix
  shell:
    interactive:
      enabled: true
    # Customise the shell prompt
    command:
      help:
        group-commands: true

# Application metadata used by banner.txt
application:
  title: J-Harmonix CLI
  version: ${project.version}

jharmonix:
  engine:
    # Seed for reproducible output; set to 0 (or omit) for random results each run
    seed: 0

logging:
  level:
    root: WARN
    it.alf.jharmonix: INFO
